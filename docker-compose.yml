version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: servicepulse_prometheus
    ports:
      - "9090:9090"
    volumes:
      # Links your local configuration file into the container
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana-oss:latest
    container_name: servicepulse_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafanadata:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  grafanadata:
